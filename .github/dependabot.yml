version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    # Batch this ecosystem into a single PR. Ungrouped, Dependabot
    # opens one PR per dependency, and each PR re-fires every
    # workflow in the repo.
    groups:
      github-actions:
        patterns:
          - "*"

